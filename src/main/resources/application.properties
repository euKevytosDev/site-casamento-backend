# 🚨 CONEXÃO COM O BANCO DE DADOS DA NUVEM (NEON)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

jwt.secret=${JWT_SECRET:casamentoJwtSecretKeyParaDesenvolvimentoAltereNoRender1234567890}
jwt.expiration-hours=24

admin.default-login=${ADMIN_LOGIN:admin}
admin.default-password=${ADMIN_PASSWORD:casamento2027}
