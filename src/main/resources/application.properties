# Configuração pública — segredos via variáveis de ambiente ou application-local.properties
# Copie application-local.properties.example → application-local.properties (não versionado)

spring.config.import=optional:classpath:application-local.properties

server.port=${PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

jwt.secret=${JWT_SECRET}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:24}

admin.default-login=${ADMIN_LOGIN}
admin.default-password=${ADMIN_PASSWORD}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.folder=${CLOUDINARY_FOLDER:presentes-casamento}

# Mercado Pago — criação (R$ 99) + mensalidade (R$ 49,90)
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
mercadopago.notification-url=${MERCADOPAGO_NOTIFICATION_URL:}
mercadopago.back-url-success=${MERCADOPAGO_BACK_URL_SUCCESS:}
mercadopago.back-url-failure=${MERCADOPAGO_BACK_URL_FAILURE:}
mercadopago.valor-criacao=${MERCADOPAGO_VALOR_CRIACAO:99.00}
mercadopago.valor-mensal=${MERCADOPAGO_VALOR_MENSAL:49.90}

# PIX — pagamento direto na sua conta (chave cadastrada no banco)
pix.chave=${PIX_CHAVE:}
pix.nome-recebedor=${PIX_NOME_RECEBEDOR:Casamento}
pix.cidade=${PIX_CIDADE:Brasil}
