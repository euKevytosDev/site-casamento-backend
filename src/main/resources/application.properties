# Configuração pública — segredos via variáveis de ambiente ou application-local.properties
# Copie application-local.properties.example → application-local.properties (não versionado)

spring.config.import=optional:classpath:application-local.properties

server.port=${PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
# Neon no Render pode demorar a acordar — evita falha no boot
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
# Pool encolhe quando só há ping de health — ajuda o Neon a suspender entre visitas
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=300000

# Em produção as tabelas já existem. "update" no boot estava derrubando o deploy no Render/Neon.
# Para criar tabelas novas localmente: DDL_AUTO=update
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:none}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=true
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

jwt.secret=${JWT_SECRET}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:24}

admin.default-login=${ADMIN_LOGIN}
admin.default-password=${ADMIN_PASSWORD}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.folder=${CLOUDINARY_FOLDER:presentes-casamento}

# Asaas — assinatura mensal SaaS (checkout da landing)
asaas.api-key=${ASAAS_API_KEY:}
asaas.api-url=${ASAAS_API_URL:https://api.asaas.com}
asaas.webhook-token=${ASAAS_WEBHOOK_TOKEN:}
asaas.back-url-success=${ASAAS_BACK_URL_SUCCESS:https://eukevytosdev.github.io/site-casamento-landing/sucesso.html}
asaas.valor-mensal=${ASAAS_VALOR_MENSAL:59.90}
asaas.permanencia-minima-meses=${ASAAS_PERMANENCIA_MINIMA_MESES:0}

# Mercado Pago — presentes no cartão (OAuth da noiva) + webhooks legados
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
# Secret do webhook (Mercado Pago → Suas integrações → Webhooks). Se vazio, aceita sem validar assinatura.
mercadopago.webhook-secret=${MERCADOPAGO_WEBHOOK_SECRET:}
mercadopago.notification-url=${MERCADOPAGO_NOTIFICATION_URL:}
mercadopago.back-url-success=${MERCADOPAGO_BACK_URL_SUCCESS:}
mercadopago.back-url-failure=${MERCADOPAGO_BACK_URL_FAILURE:}
mercadopago.valor-mensal=${MERCADOPAGO_VALOR_MENSAL:59.90}
# 0 = sem fidelidade (cancele quando quiser)
mercadopago.permanencia-minima-meses=${MERCADOPAGO_PERMANENCIA_MINIMA_MESES:0}
mercadopago.preapproval-plan-id=${MERCADOPAGO_PREAPPROVAL_PLAN_ID:}
# OAuth Connect — conta Mercado Pago da noiva (presentes no cartão)
mercadopago.oauth.client-id=${MERCADOPAGO_OAUTH_CLIENT_ID:}
mercadopago.oauth.client-secret=${MERCADOPAGO_OAUTH_CLIENT_SECRET:}
mercadopago.oauth.redirect-uri=${MERCADOPAGO_OAUTH_REDIRECT_URI:https://site-casamento-backend-nrfb.onrender.com/api/admin/mercadopago/oauth/callback}
mercadopago.admin-front-url=${MERCADOPAGO_ADMIN_FRONT_URL:https://rafaekevin.com.br/admin/painel.html}
app.site-public-base-url=${APP_SITE_PUBLIC_BASE_URL:https://rafaekevin.com.br}

# PIX — pagamento direto na sua conta (chave cadastrada no banco)
pix.chave=${PIX_CHAVE:}
pix.nome-recebedor=${PIX_NOME_RECEBEDOR:Casamento}
pix.cidade=${PIX_CIDADE:Brasil}
